# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Otel Mapping API
  version: "1.0.0"

paths:
  /presentations:
    get:
      tags:
        - componentPresentation
      summary: List all component presentations
      operationId: getComponentPresentations
      responses:
        "200":
          description: "A list of all Component Presentations"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComponentPresentation"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
    put:
      tags:
        - componentPresentation
      operationId: upsertComponentPresentations
      summary: Upserts (creates/updates) a component presentation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComponentPresentation"
      responses:
        "200":
          description: "Component presentation upserted successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentPresentation"
        "400":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"

  /presentations/{identifier}:
    parameters:
      - $ref: "#/components/parameters/identifier"
    get:
      tags:
        - componentPresentation
      operationId: getComponentPresentationByIdentifier
      summary: Get a component presentation by Identifier
      responses:
        "200":
          description: "Component presentation retrieved successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentPresentation"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "404":
          $ref: "#/components/responses/ComponentPresentationNotFound"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
    delete:
      tags:
        - componentPresentation
      operationId: deleteComponentPresentationByIdentifier
      summary: Delete a component presentation by Identifier
      responses:
        "204":
          description: "Component presentation deleted successfully"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "404":
          $ref: "#/components/responses/ComponentPresentationNotFound"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"

  /presentations/{presentationOrViewUrn}/filters:
    parameters:
      - $ref: "#/components/parameters/presentationOrViewUrn"
    get:
      tags:
        - componentPresentation
      summary: Get resolved filters for a presentation
      description: |
        Returns the effective filter definitions after applying merge semantics
        across matching ComponentPresentations. The result reflects which filters
        the frontend should render for the given presentation.
      operationId: getPresentationFilters
      responses:
        "200":
          description: Resolved filter definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresentationFiltersResponse"
        "400":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "404":
          $ref: "#/components/responses/ComponentPresentationNotFound"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"

components:
  schemas:
    ComponentPresentation:
      type: object
      properties:
        identifier:
          type: string
        name:
          type: string
        description:
          type: string
        binding:
          $ref: "settings.yaml#/components/schemas/ComponentPresentationQueryBinding"
        rank:
          $ref: "settings.yaml#/components/schemas/ComponentPresentationRank"
        presentation:
          $ref: "settings.yaml#/components/schemas/PresentationDefinition"
      required:
        - identifier
        - name
        - binding
        - presentation
    PresentationFiltersResponse:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/PresentationFilter'
          description: |
            Presentation filters in display order. Earlier items are primary (filter bar),
            later items are secondary ("More" section).
        moreTab:
          type: string
          description: Label for the "More" tab when secondary filters are present.
      required:
        - filters
        - moreTab
    PresentationFilter:
      oneOf:
        - $ref: '#/components/schemas/PresentationTagFilter'
      discriminator:
        propertyName: _type
    PresentationTagFilter:
      type: object
      properties:
        _type:
          type: string
          enum: [PresentationTagFilter]
        filterId:
          type: string
        displayName:
          $ref: "#/components/schemas/PresentationFilterName"
        tagKey:
          type: string
          description: Tag key to use for filtering.
      required:
        - _type
        - filterId
        - displayName
        - tagKey
    PresentationFilterName:
        type: object
        properties:
          singular:
              type: string
          plural:
            type: string
        required:
            - singular
            - plural
    ComponentPresentationApiError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
  responses:
    ComponentPresentationNotFound:
      description: "Component Presentation with given identifier not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComponentPresentationApiError"
    ComponentPresentationErrorResponse:
      description: "Error when handling the request on the server side."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComponentPresentationApiError"
  parameters:
    identifier:
      in: path
      name: identifier
      schema:
        type: string
      required: true
    presentationOrViewUrn:
      in: path
      name: presentationOrViewUrn
      schema:
        type: string
      required: true
      description: "A Component Presentation Identifier, legacy View (QueryView, ViewType) URNs are supported for backward compatibility"
