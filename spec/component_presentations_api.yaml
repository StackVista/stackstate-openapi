# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Otel Mapping API
  version: "1.0.0"

paths:
  /component-presentations:
    get:
      tags:
        - componentPresentation
      summary: List all component presentations
      operationId: getComponentPresentations
      responses:
        "200":
          description: "A list of all Component Presentations"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComponentPresentation"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
    put:
      tags:
        - componentPresentation
      operationId: upsertComponentPresentations
      summary: Upserts (creates/updates) a component presentation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComponentPresentation"
      responses:
        "200":
          description: "Component presentation upserted successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentPresentation"
        "400":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"

  /component-presentations/{identifier}:
    parameters:
      - $ref: "#/components/parameters/identifier"
    get:
      tags:
        - componentPresentation
      operationId: getComponentPresentationByIdentifier
      summary: Get a component presentation by Identifier
      responses:
        "200":
          description: "Component presentation retrieved successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentPresentation"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "404":
          $ref: "#/components/responses/ComponentPresentationNotFound"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
    delete:
      tags:
        - componentPresentation
      operationId: deleteComponentPresentationByIdentifier
      summary: Delete a component presentation by Identifier
      responses:
        "204":
          description: "Component presentation deleted successfully"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "404":
          $ref: "#/components/responses/ComponentPresentationNotFound"
        "500":
          $ref: "#/components/responses/ComponentPresentationErrorResponse"
components:
  schemas:
    PresentationName:
      type: object
      properties:
        singular:
          type: string
        plural:
          type: string
      required:
        - singular
        - plural
    PresentationOverview:
      type: object
      properties:
        title:
          type: string
        mainMenu:
          $ref: "#/components/schemas/PresentationMainMenu"
        columns:
          type: array
          items:
            $ref: '#/components/schemas/OverviewColumnDefinition'
      description: |
        Overview presentation definition. The `columns` field defines the columns to show in the overview table. The `flags` field can be used to enable/disable functionalities.
        If multiple ComponentPresentations match, columns are merged by `columnId` according to binding rank. Absence of the field means no overview is shown.
      required:
        - title
        - columns
    PresentationMainMenu:
      type: object
      properties:
        group:
          type: string
        icon:
          type: string
        order:
          type: number
          format: double
      required:
        - group
        - order
    ComponentPresentation:
      type: object
      properties:
        identifier:
          type: string
        name:
          type: string
        description:
          type: string
        presentation:
          $ref: "#/components/schemas/PresentationDefinition"
        expireAfterMs:
          type: integer
          format: int64
      required:
        - identifier
        - name
        - presentation
    PresentationDefinition:
      type: object
      properties:
        icon:
          type: string
        name:
          $ref: "#/components/schemas/PresentationName"
        overview:
          $ref: "#/components/schemas/PresentationOverview"
    ComponentPresentationApiError:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    OverviewColumnDefinition:
      type: object
      properties:
        columnId:
          type: string
        _type:
          type: string
          enum: [OverviewColumn]
        title:
          type: string
        display:
          $ref: '#/components/schemas/OverviewColumnDisplay'
        options:
          type: object
          additionalProperties: true
      required:
        - _type
        - title
        - display
    OverviewColumnDisplay:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: '#/components/schemas/MetricChartDisplay'
        - $ref: '#/components/schemas/ComponentLinkDisplay'
        - $ref: '#/components/schemas/HealthDisplay'
        - $ref: '#/components/schemas/TextDisplay'
        - $ref: '#/components/schemas/NumericDisplay'
        - $ref: '#/components/schemas/DurationDisplay'
        - $ref: '#/components/schemas/ReadyStatusDisplay'
        - $ref: '#/components/schemas/ContainerImageDisplay'
      description: 'Display type and value for the column.'
    MetricChartDisplay:
      type: object
      properties:
        _type:
          type: string
          enum: [MetricChartDisplay]
#        chartType:
#          type: string
#          enum: [TimeSeriesChart, BarChart, StatChart, GaugeChart]
        decimalPlaces:
          type: integer
        unit:
          type: string
        query:
          type: string
        componentIdentifierTemplate:
          type: string
        alias:
          type: string
      required:
        - _type
        - query
    ComponentLinkDisplay:
      type: object
      properties:
        _type:
          type: string
          enum: [ComponentLinkDisplay]
        name:
          type: string
          description: 'Cel expression that returns a string that represents the name of the component to link to'
        componentIdentifier:
          type: string
          description: 'Cel expression that returns a string that represents the componentIdentifier in order to build the link'
      required:
        - _type
        - value
    HealthDisplay:
      type: object
      properties:
        _type:
          type: string
          enum: [HealthDisplay]
        value:
          type: string
          description: 'Cel expression that returns a string that represents a valid HealthState'
      required:
        - _type
        - value
    TextDisplay:
      type: object
      properties:
        _type:
          type: string
          enum: [TextDisplay]
        value:
          type: string
          description: 'Cel expression that returns a string'
      required:
        - _type
        - value
    NumericDisplay:
      type: object
      properties:
        _type:
          type: string
          enum: [NumericDisplay]
        value:
          type: string
          description: 'Cel expression that returns a number'
        unit:
          type: string
          nullable: true
      required:
        - _type
        - value
    DurationDisplay:
      type: object
      properties:
        _type:
          type: string
          enum: [DurationDisplay]
        startDate:
          type: string
          description: 'Cel expression that returns a date'
        endDate:
          type: string
          description: 'Cel expression that returns a date'
      required:
        - _type
        - startDate
    ReadyStatusDisplay:
      type: object
      description: 'Helps rendering columns as Ready containers for K8s pods or Completions for K8s jobs'
      properties:
        _type:
          type: string
          enum: [ReadyStatusDisplay]
        readyNumber:
          type: string
          description: 'Cel expression that returns a number'
        totalNumber:
          type: string
          description: 'Cel expression that returns a number'
        readyStatus:
          type: string
          description: 'Cel expression that returns a string that represents a valid HealthState'
      required:
        - _type
        - readyNumber
        - totalNumber
    ContainerImageDisplay:
      type: object
      description: 'Helps rendering links for docker images'
      properties:
        _type:
          type: string
          enum: [ContainerImageDisplay]
        imageId:
          type: string
          description: 'Cel expression that returns a string'
        imageName:
          type: string
          description: 'Cel expression that returns a string'
      required:
        - _type
        - imageId
        - imageName
  responses:
    ComponentPresentationNotFound:
      description: "Component Presentation with given identifier not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComponentPresentationApiError"
    ComponentPresentationErrorResponse:
      description: "Error when handling the request on the server side."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComponentPresentationApiError"
  parameters:
    identifier:
      in: path
      name: identifier
      schema:
        type: string
      required: true
