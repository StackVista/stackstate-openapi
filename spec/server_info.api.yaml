# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Server Info API
  version: "1.0.0"
paths:
  /server/info:
    get:
      tags:
        - server
      summary: "Get server info"
      description: "Get information of the StackState information, such as version, deployment mode, etc."
      operationId: serverInfo
      responses:
        "200":
          description: "Server information"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"
        "401":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
components:
  schemas:
    Mode:
      type: string
      enum:
        - Observability
        - SecurityHub
    ServerInfo:
      type: object
      required:
        - version
        - deploymentMode
        - modes
      properties:
        version:
          $ref: "#/components/schemas/ServerVersion"
        deploymentMode:
          type: string
          enum:
            - Saas
            - SelfHosted
        platformVersion:
          $ref: "#/components/schemas/SemanticVersion"
        modes:
          type: array
          items:
            $ref: "#/components/schemas/Mode"
          minItems: 1
          uniqueItems: true
    ServerVersion:
      type: object
      required:
        - major
        - minor
        - patch
        - diff
        - commit
        - isDev
      properties:
        major:
          type: integer
        minor:
          type: integer
        patch:
          type: integer
        diff:
          type: string
        commit:
          type: string
        isDev:
          type: boolean
    SemanticVersion:
      type: string
      example: "1.2.3-alpha.1+build5678"
      description: "The version value is a semantic version, based on the official Semantic Versioning spec (https://semver.org/)."
