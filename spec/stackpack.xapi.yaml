# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: StackPack API
  version: "1.0.0"
paths:
  /stackpack:
    post:
      tags:
        - stackpack
      summary: "StackPack API"
      operationId: stackPackUpload
      description: "upload a StackPack"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StackPackUpload"
      responses:
        "202":
          description: "Upload success. Processing happens asynchronously."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackPack"
        "400":
          description: "bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
    get:
      tags:
        - stackpack
      summary: "StackPack API"
      operationId: stackPackList
      description: "list of stackpack"
      responses:
        "200":
          description: "Get list of stackpack"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StackPackList"
        "400":
          description: "bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /stackpack/validate:
    post:
      tags:
        - stackpack
      summary: "Validate API"
      operationId: stackPackValidate
      description: "Validate a stackpack's setting declarations"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/StackPackUpload"
      responses:
        "200":
          description: "validation successful"
          content:
            application/json:
              schema:
                type: string
        "400":
          description: "bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /stackpack/{stackPackName}/provision:
    post:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
        - in: query
          name: unlocked
          allowReserved: true
          required: true
          schema:
            type: string
      summary: "Provision API"
      operationId: provisionDetails
      description: "Provision details"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: "Successful provisioning of the stackpack"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionResponse"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /stackpack/{stackPackName}/deprovision/{stackPackInstanceId}:
    post:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
        - $ref: "#/components/parameters/stackPackInstanceId"
      summary: "Provision API"
      operationId: provisionUninstall
      description: "Provision details"
      responses:
        "200":
          description: "successfully uninstalled"
          content:
            application/json:
              schema:
                type: string
        "400":
          description: "bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"

  /stackpack/{stackPackName}/upgrade:
    post:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
        - in: query
          name: unlocked
          allowReserved: true
          required: true
          schema:
            type: string
      summary: "Upgrade API"
      operationId: upgradeStackPack
      description: "Upgrade stackpack"
      responses:
        "200":
          description: "successful"
          content:
            application/json:
              schema:
                type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /stackpack/{stackPackName}/versions:
    get:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
      summary: "List StackPack versions"
      operationId: stackPackListVersions
      description: "List all available versions of a StackPack"
      responses:
        "200":
          description: "List of versions"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StackPackVersionInfo"
        "404":
          description: "StackPack not found"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
    delete:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
        - in: query
          name: from
          required: false
          schema:
            type: string
          description: "Inclusive lower bound. Deletes versions >= this version. Can be used alone or combined with 'to' for a range."
        - in: query
          name: to
          required: false
          schema:
            type: string
          description: "Inclusive upper bound. Deletes versions <= this version. Can be used alone or combined with 'from' for a range."
        - in: query
          name: all
          required: false
          schema:
            type: boolean
          description: "Delete all versions. Cannot be combined with 'from' or 'to'."
        - in: query
          name: dev
          required: false
          schema:
            type: boolean
          description: "Filter to development versions only (versions with metadata, e.g. SNAPSHOT). Can be combined with any scope selector."
      summary: "Delete StackPack versions"
      operationId: stackPackDeleteVersions
      description: |
        Delete versions of a StackPack. Versions currently in use are skipped.

        Supported parameter combinations:
        - `?to=X` — delete all versions up to and including X
        - `?from=X` — delete all versions from X onwards
        - `?from=X&to=Y` — delete versions in the inclusive range [X, Y]
        - `?all=true` — delete all versions
        - Any of the above combined with `&dev=true` to restrict to development versions only
      responses:
        "200":
          description: "Batch delete result"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVersionsResult"
        "400":
          description: "Invalid parameters (e.g. invalid version string, incompatible parameter combination)"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "404":
          description: "StackPack not found"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "409":
          description: "All targeted versions are currently in use"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteVersionsResult"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /stackpack/{stackPackName}/versions/{version}:
    delete:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
        - $ref: "#/components/parameters/version"
      summary: "Delete a StackPack version"
      operationId: stackPackDeleteVersion
      description: "Delete a specific version of a StackPack. Fails if the version is currently in use."
      responses:
        "204":
          description: "Version deleted successfully"
        "400":
          description: "bad request"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "404":
          description: "Version not found"
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /stackpack/{stackPackName}/confirm-manual-steps/{stackPackInstanceId}:
    post:
      tags:
        - stackpack
      parameters:
        - $ref: "#/components/parameters/stackPackName"
        - $ref: "#/components/parameters/stackPackInstanceId"
      summary: "Confirm manual steps"
      operationId: confirmManualSteps
      description: "Confirm manual steps of the stackpack"
      responses:
        "200":
          description: "successful response"
          content:
            application/json:
              schema:
                type: string
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
components:
  parameters:
    stackPackName:
      in: path
      name: stackPackName
      required: true
      schema:
        type: string
    stackPackInstanceId:
      in: path
      name: stackPackInstanceId
      required: true
      schema:
        type: integer
        format: int64
    stackPackVersion:
      in: query
      name: version
      required: false
      schema:
        type: string
      description: "Optional version string (e.g. '1.2.3'). If not provided, validates the latest version."
    version:
      in: path
      name: version
      required: true
      schema:
        type: string
      description: "Version string (e.g. '1.2.3')"

  schemas:
    StackPackUpload:
      type: object
      properties:
        stackPack:
          type: string
          format: binary

    StackPack:
      type: object
      required:
        - name
        - displayName
        - version
        - categories
        - isNew
        - faqs
        - configurationUrls
        - releaseStatus
        - isCompatible
      properties:
        name:
          type: string
        displayName:
          type: string
        version:
          type: string
        logo:
          type: string
        categories:
          type: array
          items:
            type: string
        isNew:
          type: boolean
        overviewUrl:
          type: string
        detailedOverviewUrl:
          type: string
        resourcesUrl:
          type: string
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/FAQ"
        configurationUrls:
          type: array
          items:
            type: array
            items:
              type: string
        releaseStatus:
          $ref: "#/components/schemas/ReleaseStatus"
        isCompatible:
          type: boolean

    ReleaseStatus:
      type: string
      enum:
        - AVAILABLE
        - ENABLED
        - COMING_SOON
        - HIDDEN
        - BROKEN

    StackPackStep:
      type: object
      properties:
        display:
          type: string
        name:
          type: string
        value:
          type: object
          properties:
            _type:
              type: string

    StackPackIntegration:
      type: object
      required:
        - name
        - displayName
        - categories
        - isNew
        - faqs
      properties:
        name:
          type: string
        displayName:
          type: string
        logo:
          type: string
        brandIcon:
          type: string
        categories:
          type: array
          items:
            type: string
        isNew:
          type: boolean
        overviewUrl:
          type: string
        resourceUrl:
          type: string
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/FAQ"

    StackPackConfiguration:
      type: object
      required:
        - status
        - stackPackVersion
        - config
      properties:
        id:
          type: integer
          format: int64
        lastUpdateTimestamp:
          type: integer
          format: int64
        status:
          type: string
        error:
          $ref: "#/components/schemas/StackPackError"
        stackPackVersion:
          type: string
        config:
          type: object

    StackPackError:
      type: object
      required:
        - retryable
        - error
      properties:
        retryable:
          type: boolean
        action:
          type: string
        error:
          type: object

    StackPackList:
      type: array
      items:
        $ref: "#/components/schemas/FullStackPack"

    FAQ:
      type: object
      required:
        - question
        - answer
      properties:
        question:
          type: string
        answer:
          type: string

    FullStackPack:
      type: object
      required:
        - name
        - displayName
        - version
        - categories
        - isNew
        - isMultiConfig
        - faqs
        - configurationUrls
        - releaseStatus
        - steps
        - integrations
        - configurations
        - canUninstall
        - isCompatible
      properties:
        name:
          type: string
        displayName:
          type: string
        version:
          type: string
        logo:
          type: string
        categories:
          type: array
          items:
            type: string
        isNew:
          type: boolean
        isMultiConfig:
          type: boolean
        overviewUrl:
          type: string
        detailedOverviewUrl:
          type: string
        resourcesUrl:
          type: string
        faqs:
          type: array
          items:
            $ref: "#/components/schemas/FAQ"
        configurationUrls:
          type: array
          items:
            type: array
            items:
              type: string
        releaseStatus:
          $ref: "#/components/schemas/ReleaseStatus"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/StackPackStep"
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/StackPackIntegration"
        releaseNotes:
          type: string
        upgradeInstructions:
          type: string
        configurations:
          type: array
          items:
            $ref: "#/components/schemas/StackPackConfiguration"
        nextVersion:
          $ref: "#/components/schemas/FullStackPack"
        latestVersion:
          $ref: "#/components/schemas/FullStackPack"
        canUninstall:
          type: boolean
        isCompatible:
          type: boolean

    StackPackVersionInfo:
      type: object
      required:
        - version
        - isDev
        - isInUse
      properties:
        version:
          type: string
        isDev:
          type: boolean
        isInUse:
          type: boolean

    DeleteVersionsResult:
      type: object
      required:
        - deleted
        - skippedInUse
      properties:
        deleted:
          type: array
          items:
            type: string
        skippedInUse:
          type: array
          items:
            type: string

    ProvisionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        status:
          type: string
        name:
          type: string
        stackPackVersion:
          type: string
        lastUpdateTimestamp:
          type: integer
          format: int64

