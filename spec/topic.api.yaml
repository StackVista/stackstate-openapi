# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Topic API
  version: "1.0.0"
paths:
  /topic:
    get:
      tags:
        - topic
      summary: "Topic API"
      operationId: listTopics
      description: "Get topic list"
      responses:
        "200":
          $ref: "#/components/responses/TopicList"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"

components:
  responses:
    TopicList:
      description: "list of topic"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/Topic"
  schemas:
    Topic:
      type: object
      description: "topic object"
      properties:
        name:
          type: string
      required:
        - name