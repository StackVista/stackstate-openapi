# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Monitors API
  version: "1.0.0"
paths:
  /components/{componentIdOrIdentifier}:
    get:
      tags:
        - component
      summary: "Get full component"
      description: "Get full component details"
      operationId: getFullComponent
      parameters:
        - $ref: "#/components/parameters/componentIdOrIdentifier"
        - $ref: "#/components/parameters/topologyTime"
      responses:
        "200":
          $ref: "#/components/responses/fullComponent"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /components/{componentIdOrIdentifier}/healthHistory:
    get:
      tags:
        - component
      summary: "Get a component health history"
      description: "Get a component health history for a defined period of time by id or identifier"
      operationId: getComponentHealthHistory
      parameters:
        - $ref: "#/components/parameters/componentIdOrIdentifier"
        - $ref: "#/components/parameters/startTime"
        - $ref: "#/components/parameters/endTime"
      responses:
        "200":
          $ref: "#/components/responses/componentHealthHistory"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /components/{componentIdOrIdentifier}/checkStates:
    get:
      tags:
        - component
      summary: "Get a component checkstates"
      description: "Get a component checkstates for a defined period of time by id or identifier"
      operationId: getComponentCheckStates
      parameters:
        - $ref: "#/components/parameters/componentIdOrIdentifier"
        - $ref: "#/components/parameters/startTime"
        - $ref: "#/components/parameters/endTime"
      responses:
        "200":
          $ref: "#/components/responses/componentCheckStates"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /components/{componentIdOrIdentifier}/bindmetric:
    get:
      tags:
        - component
      summary: "Get a bound metric binding to a component"
      description: "Bind the variables in a metric binding to a component to get valid queries for fetching metric data"
      operationId: getComponentMetricBinding
      parameters:
        - $ref: "#/components/parameters/componentIdOrIdentifier"
        - $ref: "#/components/parameters/metricBindingIdentifier"
        - $ref: "#/components/parameters/topologyTime"
      responses:
        "200":
          $ref: "#/components/responses/boundMetric"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
  /components/{componentIdOrIdentifier}/boundMetricsWithData:
    get:
      tags:
        - component
      summary: "Bound metric bindings that have data for a component"
      description: "Bound metric bindings for metrics that have data for a component"
      operationId: getComponentMetricsWithData
      parameters:
        - $ref: "#/components/parameters/componentIdOrIdentifier"
        - $ref: "#/components/parameters/topologyTime"
        - $ref: "#/components/parameters/startTime"
        - $ref: "#/components/parameters/requiredEndTime"
      responses:
        "200":
          $ref: "#/components/responses/boundMetrics"
        "500":
          $ref: "generic_error_handling.xapi.yaml#/components/responses/genericErrorsResponse"
components:
  parameters:
    componentIdOrIdentifier:
      name: componentIdOrIdentifier
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/ComponentIdOrIdentifier"
      description: "The id or identifier (urn) of a component"
    metricBindingIdentifier:
      name: metricBindingIdentifier
      in: query
      required: true
      schema:
        $ref: "#/components/schemas/ComponentIdOrIdentifier"
      description: "The identifier (urn) of a metric binding"
    topologyTime:
      name: topologyTime
      in: query
      description: "A timestamp at which resources will be queried. If not given the resources are queried at current time."
      required: false
      schema:
        type: integer
        format: instant
    startTime:
      name: startTime
      in: query
      description: "The start time of a time range to query resources."
      required: true
      schema:
        type: integer
        format: instant
    endTime:
      name: endTime
      in: query
      description: "The end time of a time range to query resources. If not given the endTime is set to current time."
      required: false
      schema:
        type: integer
        format: instant
    requiredEndTime:
      name: endTime
      in: query
      description: "The end time of a time range to query resources."
      required: true
      schema:
        type: integer
        format: instant
  responses:
    componentHealthHistory:
      description: "Component health history"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComponentHealthHistory"
    componentCheckStates:
      description: "Checkstate Histories"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ComponentCheckStates"
    fullComponent:
      description: "Full component"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/FullComponent"
    boundMetric:
      description: "Bound metric"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BoundMetric"
    boundMetrics:
      description: "Bound metrics"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/BoundMetrics"
  schemas:
    ComponentIdOrIdentifier:
      type: string
    ComponentHealthHistory:
      properties:
        startTime:
          type: integer
          format: instant
        endTime:
          type: integer
          format: instant
        healthStateChanges:
          type: array
          items:
            $ref: "#/components/schemas/ComponentHealthChange"
          description: "List of health state changes ordered from most recent to oldest."
      required:
        - startTime
        - endTime
        - healthStateChanges
    ComponentHealthChange:
      properties:
        timestamp:
          type: integer
          format: int64
        newHealth:
          $ref: "common.api.yaml#/components/schemas/HealthStateValue"
      required:
        - timestamp
        - newHealth
    ComponentCheckStates:
      properties:
        checkStates:
          type: array
          items:
            $ref: "#/components/schemas/ComponentCheckState"
      required:
        - checkStates
    ComponentCheckState:
      properties:
        identifier:
          type: string
        idOrIdentifier:
          type: string
        startTime:
          type: integer
          format: instant
        endTime:
          type: integer
          format: instant
      required:
        - identifier
        - idOrIdentifier
        - startTime
        - endTime
    FullComponent:
      properties:
        typeName:
          type: string
        icon:
          type: string
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ComponentField"
        synced:
          type: array
          items:
            $ref: "#/components/schemas/ExternalComponent"
        provisioning:
          $ref: "#/components/schemas/ComponentProvisioning"
        relatedResources:
          type: array
          items:
            $ref: "#/components/schemas/RelatedResource"
          description: 'Resolved related resource definitions in display order. Backend populates from both legacy and new presentation definitions.'
        events:
          $ref: "#/components/schemas/ComponentEvents"
        data:
          $ref: "#/components/schemas/ComponentData"
        highlights:
          $ref: "#/components/schemas/LegacyComponentHighlights"
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ComponentAction"
        boundMetrics:
          type: array
          items:
            $ref: "#/components/schemas/BoundMetric"
        boundTraces:
          $ref: "#/components/schemas/BoundTraces"
      required:
        - typeName
        - fields
        - synced
        - relatedResources
        - data
        - actions
        - boundMetrics

    ComponentField:
      discriminator:
        propertyName: _type
      oneOf:
        - $ref: '#/components/schemas/ErrorField'
        - $ref: '#/components/schemas/MetricField'
        - $ref: '#/components/schemas/LinkField'
        - $ref: '#/components/schemas/ComponentLinkField'
        - $ref: '#/components/schemas/HealthField'
        - $ref: '#/components/schemas/TextField'
        - $ref: '#/components/schemas/NumericField'
        - $ref: '#/components/schemas/DurationField'
        - $ref: '#/components/schemas/RatioField'
        - $ref: '#/components/schemas/MapField'
      description: 'Display type and value for the field.'

    BaseComponentField:
      type: object
      properties:
        fieldId:
          type: string
        title:
          type: string
        description:
          type: string
      required:
        - fieldId
        - title

    ErrorField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - message
          properties:
            _type:
              enum: [ErrorField]
            message:
              type: string

    MetricField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - query
          properties:
            _type:
              enum: [MetricField]
            query:
              type: string
              description: The frontend can use the query to refresh the metrics (at interval). Allows to keep the current behaviour of making individual calls for each row.
            unit:
              type: string
            decimalPlaces:
              type: integer
    LinkField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - name
            - url
          properties:
            _type:
              enum: [LinkField]
            name:
              type: string
            url:
              type: string
    ComponentLinkField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - name
            - identifier
          properties:
            _type:
              enum: [ComponentLinkField]
            name:
              type: string
            identifier:
              type: string
    HealthField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - state
          properties:
            _type:
              enum: [HealthField]
            state:
              $ref: "common.api.yaml#/components/schemas/HealthStateValue"
    TextField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - value
            - asTag
          properties:
            _type:
              enum: [TextField]
            value:
              type: string
            asTag:
              type: boolean
              default: false
    NumericField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - value
          properties:
            _type:
              enum: [NumericField]
            value:
              type: number
            unit:
              type: string
            decimalPlaces:
              type: integer
    DurationField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - startTime
          properties:
            _type:
              enum: [DurationField]
            startTime:
              type: integer
              format: instant
            endTime:
              type: integer
              format: instant
              nullable: true
    RatioField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - numerator
            - denominator
          properties:
            _type:
              enum: [RatioField]
            numerator:
              type: number
            denominator:
              type: number
            status:
              $ref: "common.api.yaml#/components/schemas/HealthStateValue"
    MapField:
      allOf:
        - $ref: '#/components/schemas/BaseComponentField'
        - type: object
          required:
            - _type
            - values
            - asTag
          properties:
            _type:
              enum: [MapField]
            values:
              type: object
              additionalProperties:
                type: string
            asTag:
              type: boolean
              default: false

    ComponentData:
      properties:
        id:
          type: integer
          format: int64
        identifiers:
          type: array
          items:
            type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        tags:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties:
            type: string
        layerName:
          type: string
        domainName:
          type: string
        health:
          $ref: "common.api.yaml#/components/schemas/HealthStateValue"
        lastUpdateTimestamp:
          type: integer
          format: int64
      required:
        - name
        - tags
        - properties
        - synced
    ExternalComponent:
      properties:
        externalId:
          type: string
        identifiers:
          type: array
          items:
            type: string
        data:
          type: object
        id:
          type: integer
          format: int64
        lastUpdateTimestamp:
          type: integer
          format: int64
        elementTypeTag:
          type: string
        syncName:
          type: string
        sourceProperties:
          type: object
        status:
          type: object
        tags:
          type: array
          items:
            type: string
      required:
        - sourceProperties
        - identifiers
        - data
        - syncName
        - tags
    ComponentProvisioning:
      properties:
        showConfiguration:
          type: boolean
        showStatus:
          type: boolean
        externalId:
          type: string
      required:
        - showConfiguration
        - showStatus
        - externalId
    LegacyComponentHighlights:
      properties:
        namePlural:
          type: string
        showLogs:
          type: boolean
        relatedResources:
          type: array
          items:
            $ref: "settings.yaml#/components/schemas/ComponentTypeRelatedResources"
        metrics:
          type: array
          items:
            $ref: "settings.yaml#/components/schemas/ComponentHighlightMetrics"
      required:
        - namePlural
        - showLogs
        - relatedResources
        - metrics
    RelatedResource:
      type: object
      properties:
        resourceId:
          type: string
          description: 'Identity key for this related resource.'
        title:
          type: string
          description: 'Section heading displayed in the UI.'
        stql:
          type: string
          description: 'Resolved STQL query with template variables substituted.'
        presentationIdentifier:
          type: string
          description: 'ComponentPresentation identifier whose overview spec is used for rendering.'
      required:
        - resourceId
        - title
        - stql
        - presentationIdentifier
      description: |
        A resolved related resource definition returned in the FullComponent response.
        The backend merges related resources from all matching presentations, resolves template variables
        in the stql field, and derives the name from the referenced presentation's PresentationName.
        Array order in the response determines display order.

    ComponentEvents:
      properties:
        showEvents:
          type: boolean
        relatedResources:
          type: string
          description: 'Topology query for resources related to the highlighted component'
      required:
        - showEvents

    ComponentAction:
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
      required:
        - id
        - name
    BoundMetric:
      properties:
        name:
          type: string
        identifier:
          type: string
        boundQueries:
          type: array
          items:
            $ref: "#/components/schemas/BoundMetricQuery"
        description:
          type: string
        unit:
          type: string
        chartType:
          $ref: "#/components/schemas/ChartType"
        alias:
          type: string
        valuation:
          $ref: "#/components/schemas/MetricValuation"
        tags:
          type: object
          additionalProperties:
            type: string
        layout: 
          $ref: "#/components/schemas/MetricBindingLayout"
        dummy:
          type: boolean
      required:
        - name
        - boundQueries
        - chartType
        - tags
    BoundMetricQuery:
      properties:
        expression:
          type: string
        alias:
          type: string
        componentIdentifierTemplate:
          type: string
        primary:
          type: boolean
      required:
        - expression
        - alias
    ChartType:
      type: string
      enum:
        - line
    MetricValuation:
      type: string
      enum:
        - higher-is-better
        - lower-is-better
    MetricBindingLayout:
      properties:
        metricPerspective: 
          $ref: "#/components/schemas/MetricPerspectiveLocation"
        componentHighlight:
          $ref: "#/components/schemas/ComponentHighlightLocation"
        componentSummary:
          $ref: "#/components/schemas/ComponentSummaryLocation"
    ComponentHighlightLocation:
      properties:
        section:
          type: string
        weight:
          type: integer
      required:
        - section
    ComponentSummaryLocation:
      properties:
        weight:
          type: integer
    MetricPerspectiveLocation:
      properties:
        tab:
          type: string
        section:
          type: string
        weight:
          type: integer
      required:
        - tab
        - section
    BoundTraces:
      properties:
        filter:
          $ref: "traces.api.yaml#/components/schemas/SpanFilter"
      required:
        - filter
    BoundMetrics:
      properties:
        boundMetrics:
          type: array
          items:
            $ref: "#/components/schemas/BoundMetric"
      required:
        - boundMetrics
