# OpenApi header is included in this file to support code highlighting in VSCode
openapi: 3.0.3
info:
  title: Perspectives API
  description: |
    Resolves a ComponentPresentation identifier or a legacy QueryView/ViewType URN
    into the perspectives the frontend needs to render the page header, the shared timeline,
    and any of the three perspective tabs (Overview, Topology, Events).
  version: "1.0.0"

paths:
  /perspectives/{presentationOrViewUrn}:
    parameters:
      - $ref: "#/components/parameters/presentationOrViewUrn"
    get:
      tags:
        - perspectives
      summary: Get the perspectives for a view
      description: |
        Returns the perspectives, and the per-perspective configs that are available.

        Acts as the canonical view-open permission check: returns 403 when the
        caller lacks access and 404 when the URN does not resolve.
      operationId: getPerspectives
      responses:
        "200":
          description: Resolved perspectives
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Perspectives"
        "401":
          description: "Unauthorized"
        "403":
          description: "Forbidden"
        "404":
          $ref: "#/components/responses/PerspectivesNotFound"
        "500":
          $ref: "#/components/responses/PerspectivesErrorResponse"

components:
  parameters:
    presentationOrViewUrn:
      in: path
      name: presentationOrViewUrn
      schema:
        type: string
      required: true
      description: "A Component Presentation Identifier, legacy View (QueryView, ViewType) URNs are supported for backward compatibility"

  schemas:
    Perspectives:
      type: object
      description: |
        The set of perspectives the frontend needs to render a view page in one response.
        Each entry in `availablePerspectives` carries its own per-perspective config.
      properties:
        identifier:
          type: string
          description: The resolved URN (ComponentPresentation identifier or legacy QueryView/ViewType URN).
        topologyQuery:
          type: string
          description: STQL query for this view. Used by the shared timeline, the events perspective, and the topology perspective.
        availablePerspectives:
          type: array
          items:
            $ref: "#/components/schemas/AvailablePerspective"
          description: Perspectives that are both defined for this view and accessible to the caller, each carrying its own config.
      required:
        - identifier
        - topologyQuery
        - availablePerspectives

    AvailablePerspective:
      oneOf:
        - $ref: "#/components/schemas/OverviewPerspective"
        - $ref: "#/components/schemas/TopologyPerspective"
        - $ref: "#/components/schemas/EventsPerspective"
      discriminator:
        propertyName: _type

    OverviewPerspective:
      type: object
      properties:
        _type:
          type: string
          enum: [OverviewPerspective]
      required:
        - _type

    TopologyPerspective:
      type: object
      description: |
        Topology perspective. Reuses QueryMetadata from the snapshot API as the rendering
        spec; the perspectives API does not introduce a separate topology settings shape.
      properties:
        _type:
          type: string
          enum: [TopologyPerspective]
        queryMetadata:
          $ref: "snapshot.api.yaml#/components/schemas/QueryMetadata"
      required:
        - _type
        - queryMetadata

    EventsPerspective:
      type: object
      description: |
        Events perspective. Today the backend synthesizes the events config from the
        view's STQL plus documented defaults (no extra filters); no per-presentation
        config is exposed yet.
      properties:
        _type:
          type: string
          enum: [EventsPerspective]
      required:
        - _type

    PerspectivesApiError:
      type: object
      properties:
        message:
          type: string
      required:
        - message

  responses:
    PerspectivesNotFound:
      description: "No ComponentPresentation, QueryView, or ViewType found for the given URN"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerspectivesApiError"
    PerspectivesErrorResponse:
      description: "Error when handling the request on the server side."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PerspectivesApiError"
